name: Deploy to production

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: "Install Heroku CLI"
        run: curl https://cli-assets.heroku.com/install.sh | sh
      - name: "Login to Heroku"
        uses: akhileshns/heroku-deploy@v3.14.15
        with:
          heroku_api_key: ${{secrets.HEROKU_API_KEY}}
          heroku_app_name: "kudo-o-matic-production"
          heroku_email: "ods@kabisa.nl"
          justlogin: true
      - name: "Set stack to container"
        run: |
          heroku stack:set container --app kudo-o-matic-production
      - name: "Get Heroku auth token for Docker registry"
        run: |
          echo "HEROKU_AUTH_TOKEN=$(heroku auth:token)" >> $GITHUB_ENV
      - name: "Login to Heroku Docker registry"
        uses: docker/login-action@v3
        with:
          registry: registry.heroku.com
          username: _
          password: ${{ env.HEROKU_AUTH_TOKEN }}
      - name: "Build and push Docker image web"
        uses: docker/build-push-action@v4
        with:
          context: .
          file: dockerfiles/production/Dockerfile
          push: true
          tags: registry.heroku.com/kudo-o-matic-production/web
          target: web
      - name: "Build and push Docker image worker"
        uses: docker/build-push-action@v4
        with:
          context: .
          file: dockerfiles/production/Dockerfile
          push: true
          tags: registry.heroku.com/kudo-o-matic-production/worker
          target: worker
      - name: "Build and push Docker image release"
        uses: docker/build-push-action@v4
        with:
          context: .
          file: dockerfiles/production/Dockerfile
          push: true
          tags: registry.heroku.com/kudo-o-matic-production/release
          target: release
      - name: "Release app"
        run: |
          heroku container:release web worker release --app kudo-o-matic-production