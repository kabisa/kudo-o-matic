name: Rails test and deploy

on:
  push:
    branches:
      - "*"
      - "*/*"
      - "!master"
  pull_request:
    branches:
      - "*"
      - "*/*"
      - "!master"

jobs:
  test:
    env:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      RAILS_ENV: test

    runs-on: ubuntu-24.04

    services:
      db:
        image: postgres:10.2
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v2

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libmagickwand-dev imagemagick

      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Setup environment and database
        run: |
          cp env.example .env
          cp config/database.yml.ci config/database.yml
          bundle exec rails db:create
          bundle exec rails db:migrate
      - name: Run tests
        run: |
          bundle exec rspec

  deploy-staging:
    if: ${{ github.ref == 'refs/heads/update-heroku-stack' }}
    needs: test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v2
      - name: "Install Heroku CLI"
        run: curl https://cli-assets.heroku.com/install.sh | sh
      - name: "Login to Heroku"
        uses: akhileshns/heroku-deploy@v3.14.15
        with:
          heroku_api_key: ${{secrets.HEROKU_API_KEY}}
          heroku_app_name: "kudo-o-matic-staging"
          heroku_email: "ods@kabisa.nl"
          justlogin: true
      - name: "Set stack to container"
        run: |
          heroku stack:set container --app kudo-o-matic-staging
      - name: "Get Heroku auth token for Docker registry"
        run: |
          echo "HEROKU_AUTH_TOKEN=$(heroku auth:token)" >> $GITHUB_ENV
      - name: "Login to Heroku Docker registry"
        uses: docker/login-action@v3
        with:
          registry: registry.heroku.com
          username: _
          password: ${{ env.HEROKU_AUTH_TOKEN }}
      - name: "Build and push Docker image web"
        uses: docker/build-push-action@v4
        with:
          context: .
          file: dockerfiles/production/Dockerfile
          push: true
          tags: registry.heroku.com/kudo-o-matic-staging/web
          target: web
      - name: "Build and push Docker image worker"
        uses: docker/build-push-action@v4
        with:
          context: .
          file: dockerfiles/production/Dockerfile
          push: true
          tags: registry.heroku.com/kudo-o-matic-staging/worker
          target: worker
      - name: "Build and push Docker image release"
        uses: docker/build-push-action@v4
        with:
          context: .
          file: dockerfiles/production/Dockerfile
          push: true
          tags: registry.heroku.com/kudo-o-matic-staging/release
          target: release
      - name: "Release app"
        run: |
          heroku container:release web worker release --app kudo-o-matic-staging